<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>This is registration form</h1>
    <!-- GET, POST -->
    <form action="" method="GET">
        <label>Name: </label>
        <input type="text" placeholder="Alice" name="name">
        <br><br>
        
        <label>Phone: </label>
        <input type="text" placeholder="09123456789" name="phone">
        <br><br>
        
        <label>Email: </label>
        <input type="email" placeholder="alice@gmail.com" name="email">
        <br><br>

        <label>Password: </label>
        <input type="password" placeholder="******" name="password">
        <br><br>

        <label>Age: </label>
        <input type="number" name="age">
        <br><br>

        <label>Date of Birth: </label>
        <input type="date" name="dob">
        <br><br>

        <label>Gender: </label>
        <input type="radio" name="gender" value="male">Male
        <input type="radio" name="gender" value="female">female
        <br><br>

        <label for="address">Address</label><br>
        <textarea name="address"></textarea>
        <br><br>

        <!-- select or combo box -->
        <select name="fruit">
            <option value="apple">apple</option>
            <option value="" selected disabled>Choose your fav fruit</option>
            <option value="banana">banana</option>
            <option value="orange">orange</option>
        </select>
        <br><br>

        <input type="file">
        <br><br>

        <input type="reset" value="Clear">
        <input type="submit" value="Register">
    </form>
</body>
</html>
