<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }
        div {
            width: 200px;
            height: 200px;
            background-color: rgb(60, 60, 227);
        }

        div:hover {
            background-color: rgb(216, 78, 78);
        }

        .btn {
            margin-top: 20px;
            height: 40px;
            width: 55px;
            background-color: cadetblue;
            border: 1px solid black;
            border-radius: 5px;
            padding: 11px;
        }

        .btn:hover {
            background-color: rgb(48, 82, 83);
            color: aliceblue;
        }

        a:link {
            color: chartreuse;
        }
    </style>
</head>
<body>
    <div></div>

    <div class="btn">Buy</div>

    <a id="visit" href="index.html">Home</a>
    <a href="index.html">Home</a>

</html>
