<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        td {
            text-align: start;
        }
        .heading {
            text-align: center;
        }
        .no {
            text-align: end;
        }

        p {
            /* text-transform: capitalize; */
            /* font-family: "Lucida Console", "Courier New", monospace; */
            background-color: red;
        }
        .underline {
            text-decoration: underline;
            font-weight: bold;
        }
        .delete {
            text-decoration: line-through;
            font-size: 40px;
        }
        table {
            background-color: blue;
        }
    </style>
</head>
<body>
    <img src="https://static.vecteezy.com/system/resources/thumbnails/041/642/908/small/ai-generated-cute-cat-reaching-up-with-paw-on-transparent-background-png.png" alt="sample photo">

    <table border="1px" width="300px">
        <tr>
            <td class="heading">No</td>
            <td class="heading">Name</td>
            <td class="heading">Phone</td>
        </tr>
        <tr>
            <td class="no">1</td>
            <td>Thu Ta</td>
            <td>09123456</td>
        </tr>
        <tr>
            <td class="no">2</td>
            <td>Aung Aung</td>
            <td>0956789</td>
        </tr>
    </table>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Aut eligendi <span class="underline">vitae</span> ullam sit enim! Iusto sint repellat fugiat beatae ipsum expedita ad <span class="delete">excepturi</span> possimus voluptatum quo, doloribus tempore quam blanditiis.</p>


</body>
</html>
